<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=send" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <title>Chat</title>
</head>
<body>

    <section class="container">
        
    
    
            <div class="dark-mode">
            <i class="fa-solid fa-moon" alt="Modo Escuro" id="dark"></i>
        </div>
        <div class="light-mode hidden">
            <i class="fa-solid fa-sun" alt="Modo Claro" id="light"></i>
        </div>
        
        

        
        <section class="login">
            <h2>Login</h2>
            <form class="login-form">
                <input type="text" class="login-input" placeholder="Seu nome.." required>
                <button type="submit" class="login-button"> Entrar
                </button>
            </form>
        </section>

      <section class="chat">

        <div class="user-online">
                    <i class="fa-solid fa-users"></i>
                    <span class="user-online-count">
            
                    </span>

        </div>

    <section class="chat-messages">
    
        
    </section>

    <form class="chat-form">
        <input type="text" class="chat-input" placeholder="Digite uma mensagem" required>
        <button type="submit" class="chat-button">
            <span class="material-symbols-outlined">send</span>
        </button>
    </form>

</section>

    
    
    <script src="src/script.js"></script>
</body>
</html>
